name: Android CI

on:
  push:
    branches: [main, master, develop, "claude/**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Tests, lint et APK Debug
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Configurer Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Tests unitaires
        run: ./gradlew test

      - name: Lint
        run: ./gradlew lint

      - name: Construire l'APK Debug
        run: ./gradlew assembleDebug

      - name: Publier les rapports de test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapports-tests
          path: "**/build/reports/tests/"
          if-no-files-found: ignore

      - name: Publier les rapports lint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapports-lint
          path: "**/build/reports/lint-results-*"
          if-no-files-found: ignore

      - name: Publier l'APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: ravenemu-debug-apk
          path: app/build/outputs/apk/debug/*.apk

  release:
    name: APK Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    env:
      # Secrets GitHub : le keystore et ses mots de passe ne sont jamais
      # stockés dans le dépôt. Sans secrets, aucun APK Release n'est
      # construit ni publié : seul un APK signé et installable est diffusé.
      KEYSTORE_BASE64: ${{ secrets.RAVENEMU_KEYSTORE_BASE64 }}
    steps:
      - name: Signature non configurée
        if: env.KEYSTORE_BASE64 == ''
        run: |
          {
            echo "## APK Release non construit"
            echo ""
            echo "Les secrets de signature (RAVENEMU_KEYSTORE_BASE64,"
            echo "RAVENEMU_KEYSTORE_PASSWORD, RAVENEMU_KEY_ALIAS,"
            echo "RAVENEMU_KEY_PASSWORD) ne sont pas configurés : seul un APK"
            echo "signé est publié. Pour tester, utilisez l'artefact"
            echo "ravenemu-debug-apk du job de build (voir docs/BUILD.md)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Récupérer le dépôt
        if: env.KEYSTORE_BASE64 != ''
        uses: actions/checkout@v4

      - name: Installer Java
        if: env.KEYSTORE_BASE64 != ''
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Configurer Gradle
        if: env.KEYSTORE_BASE64 != ''
        uses: gradle/actions/setup-gradle@v4

      - name: Restaurer le keystore depuis les secrets
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/ravenemu.jks"
          echo "RAVENEMU_KEYSTORE_PATH=$RUNNER_TEMP/ravenemu.jks" >> "$GITHUB_ENV"

      - name: Construire l'APK Release signé
        if: env.KEYSTORE_BASE64 != ''
        env:
          RAVENEMU_KEYSTORE_PASSWORD: ${{ secrets.RAVENEMU_KEYSTORE_PASSWORD }}
          RAVENEMU_KEY_ALIAS: ${{ secrets.RAVENEMU_KEY_ALIAS }}
          RAVENEMU_KEY_PASSWORD: ${{ secrets.RAVENEMU_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Publier l'APK Release signé
        if: env.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: ravenemu-release-apk
          path: app/build/outputs/apk/release/*.apk
